<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Current County — Back Soon</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f8fafc;
      color: #0f172a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      padding: 48px 40px;
      max-width: 420px;
      width: 100%;
      text-align: center;
    }

    .icon {
      font-size: 56px;
      margin-bottom: 20px;
      display: block;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #1d4ed8;
      margin-bottom: 12px;
      letter-spacing: -0.3px;
    }

    .tagline {
      font-size: 0.95rem;
      color: #64748b;
      line-height: 1.6;
      margin-bottom: 32px;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #fef3c7;
      color: #b45309;
      border-radius: 999px;
      padding: 8px 20px;
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 32px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #b45309;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .reload-btn {
      display: inline-block;
      background: #1d4ed8;
      color: #ffffff;
      border: none;
      border-radius: 8px;
      padding: 12px 28px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s;
    }

    .reload-btn:hover { background: #1e3a8a; }

    .footer {
      margin-top: 40px;
      font-size: 0.78rem;
      color: #94a3b8;
    }
  </style>
</head>
<body>
  <div class="card">
    <span class="icon">📍</span>
    <h1>Current County</h1>
    <p class="tagline">
      We're doing a quick bit of maintenance.<br>
      We'll be back up in just a moment.
    </p>
    <div class="status-pill">
      <span class="status-dot"></span>
      Back soon
    </div>
    <br>
    <button class="reload-btn" onclick="window.location.reload()">Try again</button>
  </div>
  <p class="footer">currentcounty.com</p>
</body>
</html>
